app-id: org.luxrender.luxrender17
runtime: org.kde.Platform
runtime-version: 5.15-22.08
sdk: org.kde.Sdk
command: luxrender

finish-args:
  - --device=dri
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=host:rw

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /lib/*.a
  - /share/cmake
  - /share/doc
  - /bin/exr*
  - /bin/embree2

modules:
  - shared-modules/glew/glew.json

  - shared-modules/glu/glu-9.json

  - name: freeglut
    buildsystem: cmake
    build-options:
      - cflags: -w -fcommon -mtune=generic -std=c++11 -mmmx -msse -msse2 -O2 -pipe -mfpmath=sse -fPIC
    config-opts:
      - -D FREEGLUT_BUILD_STATIC_LIBS=ON
    sources:
      - type: archive
        url: https://sourceforge.net/projects/freeglut/files/freeglut/3.2.2/freeglut-3.2.2.tar.gz
        sha256: c5944a082df0bba96b5756dddb1f75d0cd72ce27b5395c6c1dde85c2ff297a50

  - name: zlib
    buildsystem: simple
    build-commands:
      - ./configure --static --prefix=/app
      - make install
    sources:
      - type: archive
        url: https://www.zlib.net/fossils/zlib-1.2.8.tar.gz
        sha1: a4d316c404ff54ca545ea71a27af7dbc29817088

  - name: bzip2
    buildsystem: simple
    build-commands:
      - make install PREFIX=/app
    sources:
      - type: archive
        url: https://sourceware.org/pub/bzip2/bzip2-1.0.6.tar.gz
        sha1: 3f89f861209ce81a6bab1fd1998c0ef311712002
      - type: patch
        path: patches/bzip2/bzip2-1.0.6-fpic.patch
  
  - name: xz
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --enable-static --disable-scripts --disable-xz --disable-xzdec --disable-lzmadec --disable-lzmainfo --disable-lzma-links
      - make install cxxflags="-fPIC"
    sources:
      - type: archive
        url: https://sourceforge.net/projects/lzmautils/files/xz-5.0.5.tar.xz
        sha1: 56f1d78117f0c32bbb1cfd40117aa7f55bee8765

  - name: jpeg
    buildsystem: simple
    build-commands:
      - cp /usr/bin/libtool .
      - ./configure --enable-static --prefix=/app
      - make install
    sources:
      - type: archive
        url: https://sourceforge.net/projects/libjpeg/files/libjpeg/6b/jpegsrc.v6b.tar.gz
        sha1: 7079f0d6c42fad0cfba382cf6ad322add1ace8f9
      - type: patch
        path: patches/jpeg/jpeg-6b-cpu.patch
  
  - name: tiff
    buildsystem: simple
    build-commands:
      - ./configure --enable-static --disable-shared --prefix=/app
      - make install
    sources:
      - type: archive
        url: http://download.osgeo.org/libtiff/old/tiff-4.0.3.tar.gz
        sha1: 652e97b78f1444237a82cbcfe014310e776eb6f0

  - name: png
    buildsystem: simple
    build-commands:
      - ./configure --enable-static --disable-shared --prefix=/app
      - make install
    sources:
      - type: archive
        url: https://sourceforge.net/projects/libpng/files/libpng15/older-releases/1.5.26/libpng-1.5.26.tar.xz
        sha1: eb1f924c92ddd8ee2e0b4d87a3880d626021765a

  - name: freetype
    buildsystem: simple
    build-commands:
      - ./configure --enable-static --disable-shared --prefix=/app
      - make install
    sources:
      - type: archive
        url: https://download.savannah.gnu.org/releases/freetype/freetype-2.8.1.tar.bz2
        sha1: 417bb3747c4ac95b6f2652024a53fad45581fa1c

  - name: fftw
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --enable-static --disable-shared --enable-sse2 --enable-threads --with-pic
      - make install
    sources:
      - type: archive
        url: https://fftw.org/pub/fftw/fftw-3.3.3.tar.gz
        sha1: 11487180928d05746d431ebe7a176b52fe205cf9

  - name: OpenSSL
    buildsystem: simple
    build-commands:
      - ./config no-shared -fPIC -w
      - make install INSTALL_PREFIX=/app INSTALLTOP=/
    sources:
      - type: git
        url: https://github.com/openssl/openssl/
        tag: OpenSSL_1_0_2-stable

  - name: Python3
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --with-openssl=/app/bin --disable-shared --with-ensurepip=no
      - make install -j "${FLATPAK_BUILDER_N_JOBS}" cc=g++ cxx=g++ cxxflags="-w -mtune=generic -std=c++11 -mmmx -msse -msse2 -O2 -pipe -mfpmath=sse -fPIC -fpermissive -I /app/bin -I /app/include/openssl"
    sources:
      - type: archive
        url: https://www.python.org/ftp/python/3.5.3/Python-3.5.3.tar.xz
        md5: 57d1f8bfbabf4f2500273fb0706e6f21

  - name: IlmBase
    buildsystem: cmake
    build-options:
      cxxflags: -w -mtune=generic -std=c++11 -mmmx -msse -msse2 -O2 -pipe -mfpmath=sse -fPIC
    subdir:
      IlmBase
    config-opts:
      - -D BUILD_SHARED_LIBS=NO
    sources: &openexr_sources
      - type: git
        url: https://github.com/AcademySoftwareFoundation/openexr.git
        tag: v2.2.0
      - type: patch
        path: patches/ilmbase/ilmbase-dwalookups.patch

  - name: OpenEXR
    buildsystem: cmake
    build-options:
      cxxflags: -w -mtune=generic -std=c++11 -mmmx -msse -msse2 -O2 -pipe -mfpmath=sse -fPIC -I /app/include/OpenEXR
    subdir:
      OpenEXR
    config-opts:
      - -D BUILD_SHARED_LIBS=NO
    sources:
      *openexr_sources

  - name: Boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-python=/app/bin/python3 --with-python-root=/app
      - ./b2 install variant=release link=static runtime-link=shared threading=multi cxxflags="${CXXFLAGS} -w -mtune=generic -std=c++11 -mmmx -msse -msse2 -O2 -pipe -mfpmath=sse -fPIC -I /app/include/python3.5m" linkflags="${LDFLAGS}" -j "${FLATPAK_BUILDER_N_JOBS}"
    sources:
      - type: archive
        url: http://sourceforge.net/projects/boost/files/boost/1.56.0/boost_1_56_0.tar.bz2
        sha1: f94bb008900ed5ba1994a1072140590784b9b5df

  - name: TBB
    buildsystem: cmake
    build-options:
      cflags: -w -fPIC -O3 -funwind-tables -ftree-vectorize -funroll-loops -fasynchronous-unwind-tables -flto -fno-fat-lto-objects
      cxxflags: -w -fPIC -O3 -funwind-tables -ftree-vectorize -funroll-loops -fasynchronous-unwind-tables -flto -fno-fat-lto-objects
    sources:
      - type: archive
        url: https://github.com/oneapi-src/oneTBB/archive/2019_U8.tar.gz
        sha256: 6b540118cbc79f9cbc06a35033c18156c21b84ab7b6cf56d773b168ad2b68566
      - type: patch
        path: patches/tbb/tbb_cmake.patch

  - name: OpenImageIO
    buildsystem: cmake
    build-options:
      cxxflags: -w -mtune=generic -std=c++11 -mmmx -msse -msse2 -O2 -pipe -mfpmath=sse -fPIC -Wno-error=stringop-truncation -Wno-error=class-memaccess -Wno-error=sizeof-pointer-memaccess -Wno-error=unused-function -Wno-error=deprecated-declarations -Wno-error=maybe-uninitialized -Wno-error=stringop-overflow= -Wno-error=misleading-indentation -Wno-error=format-truncation= -Wno-error=aligned-new= -Wno-error=mismatched-new-delete -I /app/bin -I /app/include/python3.5m -L /app/lib -lpython3.5m
    builddir: true
    config-opts:
      - -D USE_PYTHON=OFF
      - -D USE_PYTHON3=ON
      - -D PYTHON_INCLUDE_DIR=/app/include/python3.5m
      - -D PYTHON_LIBRARY=/app/lib/libpython3.5m.a
      - -D PYTHON_HOME=/app/bin
      - -D BUILD_TESTING=OFF
      - -D INSTALL_DOCS=OFF
      - -D INSTALL_FONTS=OFF
      - -D OIIO_BUILD_TESTS=OFF
      - -D OIIO_BUILD_TOOLS=OFF
      - -D STOP_ON_WARNING=OFF
      - -D USE_FFMPEG=OFF
      - -D USE_FIELD3D=OFF
      - -D USE_FREETYPE=OFF
      - -D USE_LIBRAW=OFF
      - -D USE_NUKE=OFF
      - -D USE_OCIO=OFF
      - -D USE_QT=OFF
      - -D BUILDSTATIC=ON
      - -D LINKSTATIC=ON
    sources:
      - type: git
        url: https://github.com/OpenImageIO/oiio.git
        tag: Release-1.6.3dev
      - type: patch
        path: patches/oiio/oiio_gpstag_redefinition.patch
        
  - name: Embree
    buildsystem: cmake
    build-options:
      cxxflags: -w -mtune=generic -O2 -pipe -fPIC
    config-opts:
      - -D EMBREE_ISPC_SUPPORT=OFF
      - -D EMBREE_TUTORIALS=OFF
      - -D EMBREE_STATIC_LIB=ON
    sources:
      - type: git
        url: https://github.com/embree/embree/
        tag: v2.17.7

  - name: OpenCL-Headers
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/KhronosGroup/OpenCL-Headers.git
        tag: v2022.01.04

  - name: OpenCL-CLHPP
    buildsystem: cmake-ninja
    config-opts:
      - -D OPENCL_INCLUDE_DIR=/app/include
      - -D OPENCL_LIB_DIR=/app/lib
      - -D BUILD_EXAMPLES=OFF
      - -D BUILD_TESTS=OFF
      - -D BUILD_DOCS=OFF
    sources:
      - type: git
        url: https://github.com/KhronosGroup/OpenCL-CLHPP.git
        tag: v2.0.11

  - name: Qt5
    buildsystem: simple
    build-options:
      cxxflags: -w -std=c++11
    build-commands:
      - ./configure -prefix "/app" -release -opensource -nomake examples -nomake tests -static
      - make install -j "${FLATPAK_BUILDER_N_JOBS}"
    sources:
     - type: archive
       url: https://download.qt.io/archive/qt/5.15/5.15.10/submodules/qtbase-everywhere-opensource-src-5.15.10.tar.xz
       sha256: c0d06cb18d20f10bf7ad53552099e097ec39362d30a5d6f104724f55fa1c8fb9

#Using the modified LuxRays git is currently NOT REQUIRED; https://github.com/LuxRender/LuxRays will build from tag "for_v1.7".

  - name: LuxRays
    buildsystem: cmake
    build-options:
      cxxflags: -w -mtune=generic -std=c++11 -static-libgcc -mmmx -msse -msse2 -O3 -pipe -mfpmath=sse -fvisibility=hidden -fvisibility-inlines-hidden -ftree-vectorize -fno-math-errno -fno-signed-zeros -fno-trapping-math -fassociative-math -fno-rounding-math -fno-signaling-nans -fcx-limited-range -floop-interchange -floop-strip-mine -floop-block -fsee -ftree-loop-linear -ftree-loop-distribution -ftree-loop-im -fivopts -ftracer -fomit-frame-pointer -fPIC -fno-stack-protector -Wno-narrowing -DCL_TARGET_OPENCL_VERSION=300 -I /app/include/python3.5m -I /usr/include/gtk-3.0 -I /usr/include/gtk-3.0/gtk -I /usr/include/glib-2.0 -I /usr/lib/x86_64-linux-gnu/glib-2.0/include/ -I /usr/include/pango-1.0/ -I /usr/include/harfbuzz -I /usr/include/cairo -I /usr/include/gdk-pixbuf-2.0 -I /usr/include/atk-1.0 -L /app/lib
      cflags: -I /app/include/python3.5m -I /usr/include/gtk-3.0 -I /usr/include/gtk-3.0/gtk -I /usr/include/glib-2.0 -I /usr/lib/x86_64-linux-gnu/glib-2.0/include/ -I /usr/include/pango-1.0/ -I /usr/include/harfbuzz -I /usr/include/cairo -I /usr/include/gdk-pixbuf-2.0 -I /usr/include/atk-1.0
      ldflags: -L /app/lib -llzma -lpython3.5m -lembree -lboost_thread -lboost_program_options -lboost_filesystem -lboost_serialization -lboost_iostreams -lboost_regex -lboost_system -lboost_python -lboost_chrono -lboost_date_time -lboost_atomic -lOpenImageIO -L /usr/lib/x86_64-linux-gnu -lpthread -lgobject-2.0 -lgtk-3 -lglib-2.0
#      env: LIBRARIES=-Wl,--start-group -llzma -lpython3.5m -lembree -lboost_thread -lboost_program_options -lboost_filesystem -lboost_serialization -lboost_iostreams -lboost_regex -lboost_system -lboost_python -lboost_chrono -lboost_date_time -lboost_atomic -lOpenImageIO -Wl,--end-group
    config-opts:
      - -D BOOST_DISABLE_ASSERTS=TRUE
      - -D HAVE_PTHREAD_H=TRUE
      - -D LUXCORE_DISABLE_EMBREE_BVH_BUILDER=TRUE
      - -D CMAKE_BUILD_TYPE=Release
      - -D PYTHON_INCLUDE_DIR=/app/include/python3.5m
      - -D PYTHON_LIBRARY=/app/lib/libpython3.5m.a
    no-make-install: true
    post-install:
      - mkdir -pv /app/include
      - cp -av include/. /app/include/.
      - mkdir -pv /app/lib
      - cp -av lib/. /app/lib/.
      - cp -av bin/slg4 /app/bin/slg4
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/bin/* /app/bin/
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/lib/* /app/lib/
    sources:
      - type: git
        url: https://github.com/rrubberr/Flatpak-LuxRays 
        tag: for_v1.7

#Using the modified Lux git is currently REQUIRED; https://github.com/LuxRender/Lux will not build.

  - name: LuxRender
    buildsystem: cmake
    build-options:
      cxxflags: -w --mtune=generic -std=c++11 -static-libgcc -mmmx -msse -msse2 -O3 -pipe -mfpmath=sse -fvisibility=hidden -fvisibility-inlines-hidden -ftree-vectorize -fno-math-errno -fno-signed-zeros -fno-trapping-math -fassociative-math -fno-rounding-math -fno-signaling-nans -fcx-limited-range -DBOOST_DISABLE_ASSERTS -floop-interchange -floop-strip-mine -floop-block -fsee -ftree-loop-linear -ftree-loop-distribution -ftree-loop-im -fivopts -ftracer -fomit-frame-pointer -DHAVE_PTHREAD_H -fPIC -fno-stack-protector -I /app/bin -I /app/lib -I /app/include/python3.5m -lpython3.5m -I /app/lib/cmake/ -I /app/lib/cmake/Qt5 -L /app/lib -lQt5Core -lQt5Gui -lQt5Widgets -L /usr/lib/x86_64-linux-gnu -DCL_TARGET_OPENCL_VERSION=300 -DCMAKE_BUILD_TYPE=Release
    builddir: true
    config-opts:
      - -D LuxRays_HOME=/app 
      - -D PYTHON_CUSTOM=TRUE
      - -D PYTHON_INCLUDE_PATH=/app/include/python3.5m
      - -D PYTHON_LIBRARIES=/app/lib/libpython3.5m.so
      - -D PYTHON_HOME=/app/bin
      - -D Qt5_DIR=/app/lib/cmake/Qt5
      - -D CMAKE_PREFIX_PATH=/app/lib/cmake/Qt5
      - -D CMAKE_FIND_PACKAGE_PREFER_CONFIG=TRUE
    post-install:
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/_flatpak_build/* /app/bin/
    sources:
      - type: dir
        path: Lux/

  - name: metadata
    buildsystem: simple
    build-commands:
       - install -Dm0644 -t /app/share/metainfo/ org.luxrender.luxrender17.metainfo.xml
       - install -Dm0644 -t /app/share/applications/ org.luxrender.luxrender17.desktop
       - install -Dm0644 -t /app/share/icons/hicolor/64x64/apps/ org.luxrender.luxrender17.png
       - install -Dm0644 -t /app/usr/share/icons/hicolor/64x64/apps/ org.luxrender.luxrender17.png
    sources:
      - type: file
        path: org.luxrender.luxrender17.metainfo.xml
      - type: file
        path: org.luxrender.luxrender17.desktop
      - type: file
        path: org.luxrender.luxrender17.png